# Ruff lint/format config
target-version = "py311"
line-length = 100
select = ["E", "F", "I", "N", "W", "UP", "B", "C4"]
ignore = ["E501"]

[tool.ruff.isort]
known-first-party = ["app", "core", "ingestion", "models", "config", "utils"]

[tool.ruff.per-file-ignores]
"tests/*" = ["S101"]  # allow assert
