# IntelRAG — Development & Production
# The Streamlit UI is disabled; the FastAPI v2 UI (port 8600) is the active interface.
#
# Usage:
#   docker compose --profile dev up -d   # SQLite + ChromaDB + fakeredis
#   docker compose --profile full up -d  # PostgreSQL + Qdrant + Redis Stack

networks:
  intelrag:
    driver: bridge

services:
  # ---- v2 FastAPI app (dev profile — SQLite + ChromaDB + fakeredis) ----------
  app-dev:
    build: .
    ports:
      - "8600:8600"
    env_file: .env
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=sqlite:///./data/intelrag.db
      - REDIS_URL=
      - VECTOR_STORE_BACKEND=chromadb
      - FILE_STORE_BACKEND=local
    volumes:
      - app_data:/app/data
    networks:
      - intelrag
    profiles:
      - dev

  # ---- v2 FastAPI app (full profile — PostgreSQL + Qdrant + Redis) -----------
  app:
    build: .
    ports:
      - "8600:8600"
    env_file: .env
    environment:
      - ENVIRONMENT=production
      - VECTOR_STORE_BACKEND=qdrant
      - FILE_STORE_BACKEND=local
      # DATABASE_URL and REDIS_URL come from .env
    volumes:
      - app_data:/app/data
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - intelrag
    profiles:
      - full

  # ---- Redis Stack -----------------------------------------------------------
  redis:
    image: redis/redis-stack:7.2.0-v6
    # Port NOT published to host — app accesses via internal network
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --maxmemory 4gb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}
      --bind 0.0.0.0
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - intelrag
    profiles:
      - full

  # ---- Qdrant ----------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.9.0
    # Port NOT published to host
    expose:
      - "6333"
    environment:
      - QDRANT__SERVICE__API_KEY=${QDRANT_API_KEY:?QDRANT_API_KEY must be set in .env}
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - intelrag
    profiles:
      - full

  # ---- PostgreSQL ------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: intelrag
      POSTGRES_USER: ${DB_USER:?DB_USER must be set in .env}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
    # Port NOT published to host
    expose:
      - "5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d intelrag"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - intelrag
    profiles:
      - full

volumes:
  app_data:
  redis_data:
  qdrant_data:
  pg_data:
