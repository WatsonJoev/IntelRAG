<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="csrf-token" content="{{ csrf_token }}" />
  <title>{% block title %}IntelRAG v2{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%230b1120'/><rect x='2.5' y='2.5' width='27' height='27' rx='6' fill='none' stroke='%233b82f6' stroke-width='2'/><text x='15' y='21.5' font-family='Arial,sans-serif' font-size='13' font-weight='700' fill='%23e2e8f0' text-anchor='middle'>IR</text><circle cx='25' cy='7' r='3' fill='%238b5cf6'/></svg>" />
  <!-- Static assets served locally — no CDN dependency -->
  <script src="/static/tailwind.js"></script>
  <script src="/static/htmx.min.js"
          integrity="sha384-ujb1lZYygJmzgSwoxRggbCHcjc0rB2XoQrxeTUQyRjrOnlCoYta87iKBWq3EsdM2"
          crossorigin="anonymous"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: {
      ink: '#0f172a', panel: '#111827', line: '#1e293b', muted: '#94a3b8',
      brand: '#3b82f6', accent: '#8b5cf6'
    } } } }
    // Auto-attach CSRF token to every htmx request
    document.addEventListener('htmx:configRequest', function(e) {
      var token = document.querySelector('meta[name="csrf-token"]');
      if (token) e.detail.headers['X-CSRF-Token'] = token.getAttribute('content');
    });
  </script>
  <style>
    body { background: #0b1120; }
    .badge { padding: 2px 10px; border-radius: 9999px; font-size: .7rem; font-weight: 600;
             font-family: ui-monospace, monospace; letter-spacing: .03em; border: 1px solid; }
    .b-fresh { background:#1e293b; color:#94a3b8; border-color:#334155; }
    .b-cache { background:#1a2e1a; color:#10b981; border-color:#166534; }
    .b-tier  { background:#1e1a2e; color:#8b5cf6; border-color:#4c1d95; }
    .b-model { background:#1e293b; color:#3b82f6; border-color:#1e40af; }
    .b-high  { background:#1a2e1a; color:#10b981; border-color:#166534; }
    .b-med   { background:#2e2a1a; color:#f59e0b; border-color:#92400e; }
    .b-low   { background:#2e1a1a; color:#ef4444; border-color:#991b1b; }
    .htmx-indicator { opacity: 0; transition: opacity .2s; }
    .htmx-request .htmx-indicator { opacity: 1; }
    .htmx-request.htmx-indicator { opacity: 1; }
    summary::-webkit-details-marker { display: none; }
    /* Rendered Markdown */
    .md p { margin: 0 0 .6rem; }
    .md > :last-child { margin-bottom: 0; }
    .md ul, .md ol { margin: .3rem 0 .7rem; padding-left: 1.3rem; }
    .md ul { list-style: disc; }
    .md ol { list-style: decimal; }
    .md li { margin: .2rem 0; }
    .md strong { color: #f1f5f9; font-weight: 700; }
    .md em { font-style: italic; }
    .md code { background:#0b1120; border:1px solid #1e293b; border-radius:4px; padding:1px 5px; font-family: ui-monospace, monospace; font-size:.85em; }
    .md pre { background:#0b1120; border:1px solid #1e293b; border-radius:8px; padding:.7rem .9rem; overflow-x:auto; margin:.5rem 0; }
    .md pre code { border:0; padding:0; background:none; }
    .md h1,.md h2,.md h3,.md h4 { font-weight:700; color:#f1f5f9; margin:.6rem 0 .4rem; line-height:1.3; }
    .md h1 { font-size:1.15rem; } .md h2 { font-size:1.05rem; } .md h3 { font-size:1rem; }
    .md a { color:#3b82f6; text-decoration:underline; }
    .md blockquote { border-left:3px solid #334155; padding-left:.8rem; color:#94a3b8; margin:.5rem 0; }
    .md table { border-collapse:collapse; margin:.5rem 0; font-size:.85em; }
    .md th,.md td { border:1px solid #1e293b; padding:4px 8px; }
    .md hr { border:0; border-top:1px solid #1e293b; margin:.7rem 0; }
  </style>
</head>
<body class="text-slate-200 min-h-screen">
  <nav class="border-b border-line bg-ink/80 backdrop-blur sticky top-0 z-10">
    <div class="max-w-5xl mx-auto px-4 h-14 flex items-center gap-6">
      <a href="/v2/chat" class="font-bold text-lg tracking-tight">
        Intel<span class="text-brand">RAG</span>
        <span class="text-[10px] align-top text-accent font-mono">v2</span>
      </a>
      {% set active = request.url.path %}
      <a href="/v2/chat" class="text-sm {{ 'text-brand' if active.startswith('/v2/chat') else 'text-muted hover:text-slate-200' }}">Chat</a>
      <a href="/v2/documents" class="text-sm {{ 'text-brand' if active.startswith('/v2/documents') else 'text-muted hover:text-slate-200' }}">Documents</a>
      <a href="/v2/admin" class="text-sm {{ 'text-brand' if active.startswith('/v2/admin') else 'text-muted hover:text-slate-200' }}">Admin</a>
      <span class="ml-auto text-xs text-muted font-mono">{% block toolbar %}{% endblock %}</span>
    </div>
  </nav>
  <main class="max-w-5xl mx-auto px-4 py-6">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
